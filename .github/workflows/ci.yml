name: AI Test Automation Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-ai-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Test Case Generation
        run: |
          python -m ai.testcase_generator

      - name: Run AI Failure Analysis
        run: |
          python -m ai.failure_analysis

      - name: Run Pytest
        run: |
          pytest

      - name: Save output
        run: |
          mkdir reports
          echo "Pipeline executed successfully" > reports/result.txt

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/